<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latin Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #161412;
    --surface:   #1e1b18;
    --surface2:  #252118;
    --surface3:  #2c271f;
    --border:    #35302a;
    --border2:   #4a4238;
    --text:      #e8e0d5;
    --text2:     #9e9080;
    --text3:     #665e52;
    --accent:    #c4935a;
    --accent-dim:#8a6035;
    --accent-bg: #231e16;
    --green:     #7dbf95;
    --green-bg:  #131f18;
    --green-bdr: #2a4535;
    --red:       #c97a7a;
    --red-bg:    #1f1313;
    --red-bdr:   #4a2525;
    --gold:      #c4a35a;
    --gold-bg:   #1e1a10;
    --gold-bdr:  #4a3d18;
    --serif: 'IM Fell English', Georgia, serif;
    --sans: 'Instrument Sans', system-ui, sans-serif;
    --r: 10px;
    --rs: 6px;
    --t: 0.18s ease;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  .app { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

  .word-drawer-tab { position: fixed; right: 0; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: right bottom; z-index: 20; font-family: var(--sans); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 14px; border: 1px solid var(--border2); border-bottom: none; border-radius: 8px 8px 0 0; background: var(--surface2); color: var(--accent); cursor: pointer; }
  .word-drawer { position: fixed; top: 0; right: 0; width: min(340px, 88vw); height: 100vh; background: var(--surface); border-left: 1px solid var(--border2); box-shadow: -18px 0 40px rgba(0,0,0,0.25); transform: translateX(100%); transition: transform 0.25s ease; z-index: 30; display: flex; flex-direction: column; }
  .word-drawer.open { transform: translateX(0); }
  .word-drawer-head { display: flex; align-items: center; gap: 12px; padding: 18px; border-bottom: 1px solid var(--border); }
  .word-drawer-title { flex: 1; }
  .word-drawer-title strong { display: block; font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--text); }
  .word-drawer-title span { display: block; margin-top: 2px; font-size: 12px; color: var(--text3); }
  .word-drawer-close { width: 30px; height: 30px; border-radius: 999px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); cursor: pointer; }
  .word-list { overflow-y: auto; padding: 10px 12px 22px; }
  .word-row { padding: 10px 8px; border-bottom: 1px solid var(--border); }
  .word-row-lat { font-family: var(--serif); font-size: 17px; color: var(--text); }
  .word-row-eng { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.35; }
  .word-row-meta { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
  .word-empty { color: var(--text3); font-family: var(--serif); font-style: italic; padding: 22px 8px; text-align: center; }

  @media (max-width: 980px) { .word-drawer-tab { top: auto; bottom: 18px; transform: none; right: 18px; border: 1px solid var(--border2); border-radius: 999px; } }

  .masthead { text-align: center; padding: 2.5rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
  .ornament { font-family: var(--serif); font-size: 13px; color: var(--text3); letter-spacing: 0.18em; margin-bottom: 1rem; }
  h1 { font-family: var(--serif); font-size: 40px; font-weight: 400; color: var(--text); line-height: 1.1; }
  h1 em { font-style: italic; color: var(--accent); }
  .sub { font-size: 12px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.5rem; }

  .mode-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 3px; gap: 2px; width: fit-content; margin: 0 auto 2rem; }
  .mode-btn { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 7px 20px; border-radius: 999px; border: none; background: transparent; color: var(--text2); cursor: pointer; transition: all var(--t); letter-spacing: 0.01em; }
  .mode-btn.active { background: var(--surface3); color: var(--accent); border: 1px solid var(--border2); }

  .sel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }

  .cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; transition: border-color var(--t); }
  .cat-card:hover { border-color: var(--border2); }
  .cat-card.has-sel { border-color: var(--accent-dim); }

  .cat-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; transition: background var(--t); }
  .cat-hdr:hover { background: var(--surface2); }

  .cbox { width: 16px; height: 16px; border: 1.5px solid var(--border2); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all var(--t); background: var(--surface); cursor: pointer; }
  .cbox.checked { background: var(--accent); border-color: var(--accent); }
  .cbox.indeterminate { background: var(--accent-bg); border-color: var(--accent-dim); }
  .cbox svg { width: 10px; height: 10px; display: none; }
  .cbox.checked svg.ck { display: block; }
  .cbox.indeterminate svg.da { display: block; }

  .cat-lbl { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .cat-cnt { font-size: 11px; color: var(--text3); background: var(--surface2); padding: 2px 7px; border-radius: 999px; border: 1px solid var(--border); }
  .chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }

  .sub-list { border-top: 1px solid var(--border); padding: 8px 14px 10px; background: var(--bg); display: none; }
  .sub-list.open { display: block; }

  .sub-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; user-select: none; }
  .sbox { width: 14px; height: 14px; border: 1.5px solid var(--border2); border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all var(--t); background: var(--surface); cursor: pointer; }
  .sbox.checked { background: var(--accent); border-color: var(--accent); }
  .sbox svg { width: 9px; height: 9px; display: none; }
  .sbox.checked svg { display: block; }
  .sub-lbl { font-size: 12px; color: var(--text2); flex: 1; }
  .sub-cnt { font-size: 11px; color: var(--text3); }

  .start-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
  .word-pill { font-family: var(--serif); font-size: 15px; color: var(--text2); flex: 1; }
  .start-btns { display: flex; gap: 8px; }
  .btn-primary { font-family: var(--sans); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; padding: 8px 20px; border-radius: 999px; border: 1px solid var(--accent); background: var(--accent); color: var(--bg); cursor: pointer; transition: all var(--t); white-space: nowrap; }
  .btn-primary:hover { background: #d4a568; border-color: #d4a568; }
  .btn-primary:disabled { opacity: 0.25; cursor: default; }
  .btn-secondary { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: 999px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); cursor: pointer; transition: all var(--t); white-space: nowrap; }
  .btn-secondary:hover { color: var(--text); background: var(--surface3); }
  .btn-secondary:disabled { opacity: 0.25; cursor: default; }

  #quizView { display: none; }

  .prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
  .prog-track { flex: 1; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .prog-lbl { font-size: 12px; color: var(--text3); min-width: 48px; text-align: right; }
  .score-pill { font-size: 12px; color: var(--green); background: var(--green-bg); padding: 3px 10px; border-radius: 999px; border: 1px solid var(--green-bdr); }
  .quiz-menu-btn { font-family: var(--sans); font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 999px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); cursor: pointer; transition: all var(--t); white-space: nowrap; }
  .quiz-menu-btn:hover { color: var(--text); background: var(--surface3); }

  .round-badge { text-align: center; margin-bottom: 1rem; }
  .round-badge span { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); background: var(--surface2); padding: 3px 12px; border-radius: 999px; border: 1px solid var(--border); }

  .prompt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem 2rem; text-align: center; margin-bottom: 0.75rem; min-height: 155px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .p-dir { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
  .p-word { font-family: var(--serif); font-size: 34px; color: var(--text); line-height: 1.25; margin-bottom: 10px; }
  .p-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--text2); background: var(--surface2); }
  .tag.decl { color: var(--accent); background: var(--accent-bg); border-color: var(--accent-dim); }
  .tag.gend { color: var(--gold); background: var(--gold-bg); border-color: var(--gold-bdr); }

  .hint-box { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 10px; font-family: var(--serif); font-style: italic; min-height: 18px; }

  .answer-wrap { margin-bottom: 8px; }
  .answer-input { width: 100%; font-family: var(--serif); font-size: 20px; padding: 13px 18px; border: 1.5px solid var(--border2); border-radius: var(--r); background: var(--surface); color: var(--text); outline: none; transition: all var(--t); text-align: center; }
  .answer-input::placeholder { color: var(--text3); }
  .answer-input:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 3px rgba(196,147,90,0.08); }
  .answer-input.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
  .answer-input.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }

  .action-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .check-btn { flex: 1; font-family: var(--sans); font-size: 14px; font-weight: 600; letter-spacing: 0.03em; padding: 11px; border-radius: var(--r); border: 1px solid var(--accent); background: var(--accent); color: var(--bg); cursor: pointer; transition: all var(--t); }
  .check-btn:hover { background: #d4a568; }
  .skip-btn { font-family: var(--sans); font-size: 13px; padding: 11px 16px; border-radius: var(--r); border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; transition: all var(--t); }
  .skip-btn:hover { background: var(--surface2); }
  .next-btn { width: 100%; font-family: var(--sans); font-size: 14px; font-weight: 500; padding: 11px; border-radius: var(--r); border: 1px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; transition: all var(--t); display: none; }
  .next-btn:hover { background: var(--surface2); }

  .feedback-box { padding: 10px 16px; border-radius: var(--rs); font-size: 14px; margin-bottom: 8px; display: none; font-family: var(--serif); }
  .feedback-box.correct { display: block; color: var(--green); background: var(--green-bg); border: 1px solid var(--green-bdr); }
  .feedback-box.wrong { display: block; color: var(--red); background: var(--red-bg); border: 1px solid var(--red-bdr); }

  #resultView { display: none; }
  .result-wrap { text-align: center; padding: 3rem 0; }
  .res-label { font-family: var(--serif); font-size: 13px; color: var(--text3); letter-spacing: 0.12em; margin-bottom: 1rem; }
  .res-score { font-family: var(--serif); font-size: 60px; color: var(--accent); line-height: 1; margin-bottom: 0.4rem; }
  .res-total { font-size: 14px; color: var(--text2); margin-bottom: 0.5rem; }
  .res-phrase { font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--text2); margin-bottom: 2rem; }
  .res-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  .review-banner { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--gold-bdr); border-radius: var(--r); padding: 14px 18px; margin-bottom: 1.5rem; }
  .review-icon { font-size: 18px; color: var(--gold); flex-shrink: 0; }
  .review-text { flex: 1; }
  .review-text strong { font-size: 14px; font-weight: 600; color: var(--text); display: block; margin-bottom: 2px; }
  .review-text span { font-size: 12px; color: var(--text2); }
  .review-btn { font-family: var(--sans); font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 999px; border: 1px solid var(--gold-bdr); background: var(--gold-bg); color: var(--gold); cursor: pointer; transition: all var(--t); white-space: nowrap; }
  .review-btn:hover { background: #2a2210; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .prompt-card { animation: fadeIn 0.22s ease; }
</style>
</head>
<body>
<div class="app">

  <div id="selectorView">
    <div class="masthead">
      <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
      <h1><em>Latin</em> Trainer</h1>
      <p class="sub">Vocabularium Latinum</p>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="modeEL" onclick="setMode('el')">English → Latin</button>
      <button class="mode-btn" id="modeLE" onclick="setMode('le')">Latin → English</button>
    </div>

    <div class="sel-grid" id="selGrid"></div>

    <div class="start-bar">
      <span class="word-pill" id="wordPill">0 words selected</span>
      <div class="start-btns">
        <button class="btn-primary" id="startBtn" onclick="startSession('review')" disabled>Begin</button>
      </div>
    </div>
  </div>

  <div id="quizView">
    <div class="prog-row">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <span class="prog-lbl" id="progLbl">1 / 10</span>
      <span class="score-pill" id="scorePill">0 correct</span>
      <button class="quiz-menu-btn" onclick="backToMenu()">Menu</button>
    </div>

    <div class="round-badge" id="roundBadge"><span>Round 1</span></div>

    <div class="prompt-card" id="promptCard">
      <div class="p-dir" id="pDir"></div>
      <div class="p-word" id="pWord"></div>
      <div class="p-tags" id="pTags"></div>
    </div>

    <div class="hint-box" id="hintBox"></div>

    <div class="answer-wrap">
      <input class="answer-input" id="answerInput" type="text" placeholder="Type your answer…" autocomplete="off" spellcheck="false" />
    </div>

    <div class="feedback-box" id="feedbackBox"></div>

    <div class="action-row">
      <button class="check-btn" id="checkBtn" onclick="checkAnswer()">Check</button>
      <button class="skip-btn" onclick="skipQ()">Skip</button>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">Next →</button>
  </div>

  <div id="resultView">
    <div class="result-wrap">
      <div class="res-label" id="resLabel">Result</div>
      <div class="res-score" id="resScore"></div>
      <div class="res-total" id="resTotal"></div>
      <div class="res-phrase" id="resPhrase"></div>
      <div id="reviewBanner" class="review-banner" style="display:none">
        <span class="review-icon">↺</span>
        <div class="review-text">
          <strong id="reviewBannerTitle"></strong>
          <span id="reviewBannerSub"></span>
        </div>
        <button class="review-btn" onclick="continueReview()">Review →</button>
      </div>
      <div class="res-btns">
        <button class="btn-primary" onclick="retryQuiz()">Try again</button>
        <button class="btn-secondary" onclick="backToMenu()">Menu</button>
      </div>
    </div>
  </div>

</div>

<button class="word-drawer-tab" id="wordDrawerTab" onclick="toggleWordDrawer(true)">Word list</button>
<aside class="word-drawer" id="wordDrawer" aria-label="Word list">
  <div class="word-drawer-head">
    <div class="word-drawer-title">
      <strong>Words</strong>
      <span id="wordDrawerCount">0 selected</span>
    </div>
    <button class="word-drawer-close" onclick="toggleWordDrawer(false)">×</button>
  </div>
  <div class="word-list" id="wordList"></div>
</aside>

<script>
const DATA = {
  nouns:{label:"Nouns",sub:{
    "1st declension":{decl:"1st",words:[
      {lat:"casa",gen:null,gender:"f",eng:["cottage"]},{lat:"puella",gen:null,gender:"f",eng:["girl"]},{lat:"cena",gen:null,gender:"f",eng:["dinner"]},{lat:"terra",gen:null,gender:"f",eng:["land","country","ground","earth"]},{lat:"femina",gen:null,gender:"f",eng:["woman"]},{lat:"regina",gen:null,gender:"f",eng:["queen"]},{lat:"mensa",gen:null,gender:"f",eng:["table"]},{lat:"silva",gen:null,gender:"f",eng:["forest","woods"]},{lat:"porta",gen:null,gender:"f",eng:["gate"]},{lat:"hasta",gen:null,gender:"f",eng:["spear"]},{lat:"aqua",gen:null,gender:"f",eng:["water"]},{lat:"epistula",gen:null,gender:"f",eng:["letter"]},{lat:"via",gen:null,gender:"f",eng:["road","street"]},{lat:"ianua",gen:null,gender:"f",eng:["door"]},{lat:"taberna",gen:null,gender:"f",eng:["tavern"]},{lat:"filia",gen:null,gender:"f",eng:["daughter"]},{lat:"fabula",gen:null,gender:"f",eng:["story"]},{lat:"insula",gen:null,gender:"f",eng:["island"]},{lat:"pecunia",gen:null,gender:"f",eng:["money"]},{lat:"pugna",gen:null,gender:"f",eng:["fight"]},{lat:"patria",gen:null,gender:"f",eng:["homeland"]},{lat:"magistra",gen:null,gender:"f",eng:["female teacher"]},{lat:"ancilla",gen:null,gender:"f",eng:["slave girl"]},{lat:"hora",gen:null,gender:"f",eng:["hour"]},{lat:"toga",gen:null,gender:"f",eng:["toga"]},{lat:"statua",gen:null,gender:"f",eng:["statue"]},{lat:"dea",gen:null,gender:"f",eng:["goddess"]},{lat:"schola",gen:null,gender:"f",eng:["class","classroom"]},{lat:"domina",gen:null,gender:"f",eng:["mistress"]},{lat:"agricola",gen:null,gender:"m",eng:["farmer"]},{lat:"poeta",gen:null,gender:"m",eng:["poet"]},{lat:"nauta",gen:null,gender:"m",eng:["sailor"]}

      {lat:"servus",gen:null,gender:"m",eng:["slave"]},{lat:"discipulus",gen:null,gender:"m",eng:["student"]},{lat:"amicus",gen:null,gender:"m",eng:["friend"]},{lat:"filius",gen:null,gender:"m",eng:["son"]},{lat:"murus",gen:null,gender:"m",eng:["wall"]},{lat:"cibus",gen:null,gender:"m",eng:["food"]},{lat:"hortus",gen:null,gender:"m",eng:["garden"]},{lat:"equus",gen:null,gender:"m",eng:["horse"]},{lat:"campus",gen:null,gender:"m",eng:["plain"]},{lat:"colonus",gen:null,gender:"m",eng:["farmer"]},{lat:"somnus",gen:null,gender:"m",eng:["sleep"]},{lat:"sonus",gen:null,gender:"m",eng:["sound"]},{lat:"nuntius",gen:null,gender:"m",eng:["messenger"]},{lat:"ventus",gen:null,gender:"m",eng:["wind"]},{lat:"gladius",gen:null,gender:"m",eng:["sword"]},{lat:"deus",gen:null,gender:"m",eng:["god"]},{lat:"ludus",gen:null,gender:"m",eng:["school"]},{lat:"annus",gen:null,gender:"m",eng:["year"]},{lat:"barbarus",gen:null,gender:"m",eng:["barbarian"]},{lat:"libertus",gen:null,gender:"m",eng:["freedman"]},{lat:"dominus",gen:null,gender:"m",eng:["master"]},{lat:"medicus",gen:null,gender:"m",eng:["doctor"]},{lat:"vir",gen:null,gender:"m",eng:["man"]},{lat:"puer",gen:null,gender:"m",eng:["boy"]},{lat:"ager",gen:null,gender:"m",eng:["field"]},{lat:"liber",gen:null,gender:"m",eng:["book"]},{lat:"magister",gen:null,gender:"m",eng:["teacher"]}
    ]},
    "2nd declension (neut)":{decl:"2nd",words:[
      {lat:"castra",gen:null,gender:"n",eng:["camp"]},{lat:"bellum",gen:null,gender:"n",eng:["war"]},{lat:"vinum",gen:null,gender:"n",eng:["wine"]},{lat:"proelium",gen:null,gender:"n",eng:["battle"]},{lat:"periculum",gen:null,gender:"n",eng:["danger"]},{lat:"arma",gen:null,gender:"n",eng:["arms","weapons"]},{lat:"frumentum",gen:null,gender:"n",eng:["wheat","grain"]},{lat:"consilium",gen:null,gender:"n",eng:["plan"]},{lat:"auxilium",gen:null,gender:"n",eng:["help"]},{lat:"donum",gen:null,gender:"n",eng:["gift"]},{lat:"verbum",gen:null,gender:"n",eng:["word"]},{lat:"saxum",gen:null,gender:"n",eng:["rock"]},{lat:"oppidum",gen:null,gender:"n",eng:["town"]}

function stripAnnoyingNotes(s){
  return String(s)
    .replace(/\s*\((?:singular|plural|masculine|feminine|masc|fem)\)\s*/gi,' ')
    .replace(/\b(?:singular|plural)\b/gi,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function stripAnnoyingNotes(text){
  // Remove notes that are annoying to type, unless we deliberately show them as question clues.
  return String(text)
    .replace(/\s*\((?:singular|plural|masculine|feminine|masc|fem)\)\s*/gi, ' ')
    .replace(/\b(?:singular|plural|masculine|feminine|masc|fem)\b/gi, ' ')
    .replace(/\s+/g,' ')
    .trim();
}

function displayEng(w){
  // These extra words are CLUES in English → Latin, so you can tell which Latin word to type.
  if(w.lat === 'eos') return 'them masculine';
  if(w.lat === 'eas') return 'them feminine';
  if(w.lat === 'te') return 'you singular';
  if(w.lat === 'vos') return 'you plural';
  return w.eng.map(e => String(e).replace(/[()]/g,'').replace(/\s+/g,' ').trim()).join(', ');
}

function normaliseAnswerText(s){
  let text = String(s).toLowerCase().trim();
  // In Latin → English, the extra clue words are NOT required in your answer.
  text = text.replace(/^them\s*(?:\((?:masculine|feminine|masc|fem)\)|(?:masculine|feminine|masc|fem))?$/i, 'them');
  text = text.replace(/^you\s*(?:\((?:singular|plural)\)|(?:singular|plural))?$/i, 'you');
  return stripAnnoyingNotes(text)
    .toLowerCase()
    .replace(/[^a-z\s]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}

function is3rd(subKey){ return subKey && subKey.startsWith('3rd'); }

function fullLat(w, subKey){
  if(is3rd(subKey) && w.gen) return w.lat + ' ' + w.gen + ' ' + w.gender;
  return w.lat;
}

function checkLat(input, w, subKey){
  const n = s => s.toLowerCase().replace(/\s+/g,' ').trim();
  const v = n(input);
  if(!v) return false;
  if(v === n(fullLat(w,subKey))) return true;
  if(v === n(w.lat)) return true;
  return false;
}

function checkEng(input, w){
  const v = normaliseAnswerText(input);

  // Latin → English: these pairs should accept the simple base word only.
  // The extra detail is only a clue when English is shown as the QUESTION.
  if((w.lat === 'eos' || w.lat === 'eas') && v === 'them') return true;
  if((w.lat === 'te' || w.lat === 'vos') && v === 'you') return true;

  return w.eng.some(e => normaliseAnswerText(e) === v);
}

function buildUI(){
  const grid = document.getElementById('selGrid');
  grid.innerHTML = '';
  Object.entries(DATA).forEach(([ck, cat]) => {
    const sks = Object.keys(cat.sub);
    const total = sks.reduce((a,s) => a + cat.sub[s].words.length, 0);
    selected[ck] = {};
    sks.forEach(s => { selected[ck][s] = false; });

    const card = document.createElement('div');
    card.className = 'cat-card'; card.id = 'card_'+ck;

    const hdr = document.createElement('div');
    hdr.className = 'cat-hdr';

    const cb = document.createElement('div');
    cb.className = 'cbox'; cb.id = 'cbox_'+ck;
    cb.innerHTML = `<svg class="ck" viewBox="0 0 10 10" fill="none" stroke="#161412" stroke-width="1.8" stroke-linecap="round"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg><svg class="da" viewBox="0 0 10 10" fill="none" stroke="#c4935a" stroke-width="2" stroke-linecap="round"><line x1="2" y1="5" x2="8" y2="5"/></svg>`;

    const lbl = document.createElement('span'); lbl.className = 'cat-lbl'; lbl.textContent = cat.label;
    const cnt = document.createElement('span'); cnt.className = 'cat-cnt'; cnt.textContent = total;

    hdr.appendChild(cb); hdr.appendChild(lbl); hdr.appendChild(cnt);

    const subList = document.createElement('div');
    subList.className = 'sub-list'; subList.id = 'subs_'+ck;

    const chev = document.createElement('span');
    chev.className = 'chevron'; chev.id = 'chev_'+ck; chev.textContent = '⌄';
    hdr.appendChild(chev);
    hdr.addEventListener('click', e => {
      if(e.target === cb || cb.contains(e.target)) return;
      subList.classList.toggle('open');
      chev.classList.toggle('open');
    });

    cb.addEventListener('click', e => {
      e.stopPropagation();
      const allOn = Object.values(selected[ck]).every(v=>v);
      const newV = !allOn;
      sks.forEach(s => {
        selected[ck][s] = newV;
        const sc = document.getElementById('sbox_'+ck+'_'+s);
        if(sc) sc.className = 'sbox'+(newV?' checked':'');
      });
      updCatBox(ck);
      if(newV && !subList.classList.contains('open')){ subList.classList.add('open'); chev.classList.add('open'); }
      updCount();
    });

    sks.forEach(s => {
      const row = document.createElement('div'); row.className = 'sub-row';
      const sc = document.createElement('div'); sc.className = 'sbox'; sc.id = 'sbox_'+ck+'_'+s;
      sc.innerHTML = `<svg viewBox="0 0 9 9" fill="none" stroke="#161412" stroke-width="1.8" stroke-linecap="round"><polyline points="1,4.5 3.5,7 8,2"/></svg>`;
      const sl = document.createElement('span'); sl.className = 'sub-lbl'; sl.textContent = s;
      const sct = document.createElement('span'); sct.className = 'sub-cnt'; sct.textContent = cat.sub[s].words.length;
      row.appendChild(sc); row.appendChild(sl); row.appendChild(sct);
      row.addEventListener('click', () => {
        selected[ck][s] = !selected[ck][s];
        sc.className = 'sbox'+(selected[ck][s]?' checked':'');
        updCatBox(ck);
        updCount();
      });
      subList.appendChild(row);
    });

    card.appendChild(hdr); card.appendChild(subList);
    grid.appendChild(card);
  });
  updCount();
}

function updCatBox(ck){
  const vals = Object.values(selected[ck]);
  const allOn = vals.every(v=>v), anyOn = vals.some(v=>v);
  const cb = document.getElementById('cbox_'+ck);
  const card = document.getElementById('card_'+ck);
  cb.className = 'cbox'+(allOn?' checked':anyOn?' indeterminate':'');
  if(card) card.className = 'cat-card'+(anyOn?' has-sel':'');
}

function setMode(m){
  mode = m;
  document.getElementById('modeEL').className = 'mode-btn'+(m==='el'?' active':'');
  document.getElementById('modeLE').className = 'mode-btn'+(m==='le'?' active':'');
  if(document.getElementById('wordDrawer').classList.contains('open')) renderWordList();
}

function getWords(){
  const words = [];
  Object.entries(selected).forEach(([ck,subs]) => {
    Object.entries(subs).forEach(([sk,on]) => {
      if(on) DATA[ck].sub[sk].words.forEach(w => words.push({...w,catKey:ck,subKey:sk}));
    });
  });
  return words;
}

function toggleWordDrawer(open){
  const drawer = document.getElementById('wordDrawer');
  drawer.classList.toggle('open', open);
  if(open) renderWordList();
}

function renderWordList(){
  const list = document.getElementById('wordList');
  const words = getWords();
  document.getElementById('wordDrawerCount').textContent = words.length + (words.length===1 ? ' selected' : ' selected');
  if(words.length===0){
    list.innerHTML = '<div class="word-empty">Choose some categories to see the words here.</div>';
    return;
  }
  list.innerHTML = words.map(w => {
    const lat = fullLat(w,w.subKey);
    const eng = displayEng(w);
    const meta = DATA[w.catKey].label + (w.subKey ? ' · ' + w.subKey : '');
    return `<div class="word-row"><div class="word-row-lat">${lat}</div><div class="word-row-eng">${eng}</div><div class="word-row-meta">${meta}</div></div>`;
  }).join('');
}

function updCount(){
  const n = getWords().length;
  document.getElementById('wordPill').textContent = n + (n===1?' word':' words') + ' selected';
  document.getElementById('startBtn').disabled = n===0;
  document.getElementById('wordDrawerCount').textContent = n + (n===1?' selected':' selected');
  if(document.getElementById('wordDrawer').classList.contains('open')) renderWordList();
}

function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function startSession(sm){
  clearTimeout(autoNextTimer);
  sessionMode = sm;
  quizWords = shuffle([...getWords()]);
  current = 0; score = 0; answered = false;
  wrongWords = [];
  round = 1;
  totalWords = quizWords.length;
  totalCorrect = 0;
  showView('quizView');
  showQ();
}

function showView(id){
  ['selectorView','quizView','resultView'].forEach(v => {
    const el = document.getElementById(v);
    if(v === 'selectorView') el.style.display = (v===id?'':'none');
    else el.style.display = (v===id?'block':'none');
  });
}

function showQ(){
  clearTimeout(autoNextTimer);
  answered = false;
  const w = quizWords[current];
  const total = quizWords.length;
  const pct = Math.round(current/total*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLbl').textContent = (current+1)+' / '+total;
  document.getElementById('scorePill').textContent = score+' correct';
  document.getElementById('roundBadge').innerHTML = '<span>Round '+round+'</span>';

  const ai = document.getElementById('answerInput');
  ai.value=''; ai.className='answer-input'; ai.disabled=false;
  document.getElementById('feedbackBox').className='feedback-box';
  document.getElementById('feedbackBox').textContent='';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('checkBtn').style.display='';
  document.getElementById('checkBtn').disabled=false;
  document.querySelector('.skip-btn').disabled=false;
  document.getElementById('hintBox').textContent='';

  const tags = document.getElementById('pTags'); tags.innerHTML='';

  if(mode==='el'){
    document.getElementById('pDir').textContent = 'English → Latin';
    document.getElementById('pWord').textContent = displayEng(w);
    if(w.catKey==='nouns'){
      const d=document.createElement('span'); d.className='tag decl'; d.textContent=w.subKey; tags.appendChild(d);
    }
    if(is3rd(w.subKey)&&w.gen) document.getElementById('hintBox').textContent='Give: nominative  genitive  gender  (e.g. leo leonis m)';
  } else {
    document.getElementById('pDir').textContent = 'Latin → English';
    document.getElementById('pWord').textContent = is3rd(w.subKey)&&w.gen ? w.lat+' '+w.gen+' '+w.gender : w.lat;
    if(w.catKey==='nouns'){
      const d=document.createElement('span'); d.className='tag decl'; d.textContent=w.subKey; tags.appendChild(d);
    }
    if(w.gender){
      const g=document.createElement('span'); g.className='tag gend';
      g.textContent = w.gender==='f'?'feminine':w.gender==='m'?'masculine':'neuter';
      tags.appendChild(g);
    }
  }

  const pc = document.getElementById('promptCard');
  pc.style.animation='none';
  requestAnimationFrame(()=>{ pc.style.animation='fadeIn 0.22s ease'; });
  setTimeout(()=>ai.focus(),50);
}

function checkAnswer(){
  if(answered) return;
  const w = quizWords[current];
  const val = document.getElementById('answerInput').value.trim();
  if(!val) return;
  answered = true;

  const correct = mode==='el' ? checkLat(val,w,w.subKey) : checkEng(val,w);
  const ai = document.getElementById('answerInput');
  const fb = document.getElementById('feedbackBox');
  ai.disabled = true;

  if(correct){
    score++; totalCorrect++;
    ai.className='answer-input correct';
    fb.className='feedback-box correct';
    fb.textContent='✓ Correct';
  } else {
    if(sessionMode==='review') wrongWords.push(w);
    ai.className='answer-input wrong';
    fb.className='feedback-box wrong';
    const ans = mode==='el' ? fullLat(w,w.subKey) : displayEng(w);
    fb.textContent='✗ '+ans;
  }

  document.getElementById('scorePill').textContent=score+' correct';
  document.getElementById('checkBtn').style.display='none';
  document.querySelector('.skip-btn').disabled=true;
  document.getElementById('nextBtn').style.display='block';
  document.getElementById('nextBtn').textContent = correct ? 'Next in 0.5s…' : 'Next in 1s…';
  autoNextTimer = setTimeout(nextQ, correct ? 500 : 1000);
}

function skipQ(){
  if(answered) return;
  answered = true;
  const w = quizWords[current];
  if(sessionMode==='review') wrongWords.push(w);
  const ai = document.getElementById('answerInput');
  ai.className='answer-input wrong'; ai.disabled=true;
  const fb = document.getElementById('feedbackBox');
  fb.className='feedback-box wrong';
  const ans = mode==='el' ? fullLat(w,w.subKey) : displayEng(w);
  fb.textContent='→ '+ans;
  document.getElementById('checkBtn').style.display='none';
  document.querySelector('.skip-btn').disabled=true;
  document.getElementById('nextBtn').style.display='block';
  document.getElementById('nextBtn').textContent = 'Next in 1s…';
  autoNextTimer = setTimeout(nextQ, 1000);
}

function nextQ(){
  clearTimeout(autoNextTimer);
  document.getElementById('nextBtn').textContent = 'Next →';
  current++;
  if(current>=quizWords.length){ showResult(); return; }
  showQ();
}

const PHRASES = [[100,"Optime! Perfectly done."],[80,"Bene! Well done."],[60,"Satis bene. Keep going."],[0,"Persevera. Try again."]];

function showResult(){
  showView('resultView');
  const total = quizWords.length;
  const pct = Math.round(score/total*100);

  if(sessionMode==='review'){
    document.getElementById('resLabel').textContent = wrongWords.length===0 ? 'Review complete' : 'Round '+round+' complete';
    document.getElementById('resScore').textContent = score+' / '+total;
    document.getElementById('resTotal').textContent = pct+'% this round';
    document.getElementById('resPhrase').textContent = wrongWords.length===0 ? 'Optime! You got everything right.' : (PHRASES.find(([t])=>pct>=t)||PHRASES[PHRASES.length-1])[1];

    const banner = document.getElementById('reviewBanner');
    if(wrongWords.length>0){
      banner.style.display='flex';
      document.getElementById('reviewBannerTitle').textContent = wrongWords.length+' word'+(wrongWords.length===1?' needs':'s need')+' more practice';
      document.getElementById('reviewBannerSub').textContent = 'Round '+(round+1)+' will drill just these words.';
    } else {
      banner.style.display='none';
    }
  } else {
    document.getElementById('resLabel').textContent = 'Result';
    document.getElementById('resScore').textContent = score+' / '+total;
    document.getElementById('resTotal').textContent = pct+'%';
    document.getElementById('resPhrase').textContent = (PHRASES.find(([t])=>pct>=t)||PHRASES[PHRASES.length-1])[1];
    document.getElementById('reviewBanner').style.display='none';
  }
}

function continueReview(){
  round++;
  quizWords = shuffle([...wrongWords]);
  wrongWords = [];
  current = 0; score = 0; answered = false;
  showView('quizView');
  showQ();
}

function retryQuiz(){
  clearTimeout(autoNextTimer);
  quizWords = shuffle([...quizWords]);
  wrongWords = [];
  current = 0; score = 0; answered = false;
  round = 1;
  showView('quizView');
  showQ();
}

function backToMenu(){
  clearTimeout(autoNextTimer);
  showView('selectorView');
}

document.addEventListener('keydown', e => {
  if(document.getElementById('quizView').style.display!=='block') return;
  if(e.key==='Enter'){
    if(!answered) checkAnswer();
    else if(document.getElementById('nextBtn').style.display!=='none') nextQ();
  }
});

buildUI();
</script>
</body>
</html>
